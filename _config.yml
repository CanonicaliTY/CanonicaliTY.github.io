# Hexo Configuration
# Docs: https://hexo.io/docs/configuration.html

# Site
title: 柚葉月
subtitle: 青蓝の空 遥か彼方
description: 物理、AI、coding，以及一些生活里的观察。
keywords:
  - Physics
  - AI
  - Coding
author: Tingyu Chen
language: zh-CN
timezone: Europe/London

# URL
url: https://canonicality.top
permalink: :year/:month/:day/:title/
permalink_defaults:
pretty_urls:
  trailing_index: true
  trailing_html: true

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
syntax_highlighter:

# Home page
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# Category & Tag
default_category: Notes
category_map:
tag_map:

# Metadata
meta_generator: true

# Date / Time format
date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: 'mtime'

# Pagination
per_page: 10
pagination_dir: page

# Archive generator
archive_generator:
  enabled: true
  per_page: 0
  yearly: false
  monthly: false
  daily: false

# Include / Exclude
include:
exclude:
ignore:

# Extensions
theme: particlex

# Deployment is handled by GitHub Actions.
deploy:
  type: ''
